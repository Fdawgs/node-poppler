version: 2
updates:
    - package-ecosystem: devcontainers
      commit-message:
          include: scope
          prefix: build
      cooldown:
          include:
              - "*"
          default-days: 7
      directory: /
      groups:
          devcontainers:
              patterns:
                  - "ghcr.io/devcontainers/features/*"
      open-pull-requests-limit: 20
      schedule:
          interval: monthly

    - package-ecosystem: github-actions
      commit-message:
          include: scope
          prefix: ci
      cooldown:
          include:
              - "*"
          default-days: 7
      directory: /
      groups:
          fdawgs-owned:
              patterns:
                  - "@fdawgs/*"
                  - "fdawgs/*"
          github-owned:
              patterns:
                  - "actions/*"
                  - "github/*"
                  - "octokit/*"
      open-pull-requests-limit: 20
      schedule:
          interval: monthly
