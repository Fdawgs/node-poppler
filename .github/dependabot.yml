version: 2
updates:
    - package-ecosystem: devcontainers
      commit-message:
          include: scope
          prefix: build
      cooldown:
          default-days: 7
      directory: /
      groups:
          devcontainers:
              patterns:
                  - "ghcr.io/devcontainers/features/*"
      open-pull-requests-limit: 20
      schedule:
          interval: monthly

    - package-ecosystem: github-actions
      commit-message:
          include: scope
          prefix: ci
      cooldown:
          default-days: 7
      directory: /
      groups:
          fdawgs-owned:
              patterns:
                  - "fdawgs/*"
          github-owned:
              patterns:
                  - "actions/*"
                  - "github/*"
                  - "octokit/*"
      open-pull-requests-limit: 20
      schedule:
          interval: monthly

    - package-ecosystem: npm
      commit-message:
          include: scope
          prefix: build
      cooldown:
          semver-major-days: 60
          semver-minor-days: 21
          semver-patch-days: 7
      directory: /
      groups:
          commitlint:
              patterns:
                  - "@commitlint*"
          eslint:
              patterns:
                  - "@eslint*"
                  - "*eslint-config*"
                  - "eslint*"
      ignore:
          # Below are dependencies that have migrated to ESM
          # in their next major version so they cannot be updated
          - dependency-name: camelcase
            update-types:
                - "version-update:semver-major"
      open-pull-requests-limit: 20
      schedule:
          interval: monthly
